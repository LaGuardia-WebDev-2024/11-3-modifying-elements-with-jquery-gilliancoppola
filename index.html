<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>The Caterpillar</h1>

    <p>This is a <strong>caterpillar</strong> in its natural habitat:</p>
    

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
        $("h1").text("The Butterfly")
        $("p").html("This is a <strong>butterfly</strong> in its natural habitat:" )
        $("img").attr("src","https://www.kasandbox.org/programming-images/animals/butterfly_monarch.png")
        $("h1").css("color","orange")

  
  
  $(document).ready(function(){
  $("#flip").click(function(){
    $("#panel").slideToggle("slow");
  });
});
</script>
<style> 
#panel, #flip {
  padding: 5px;
  text-align: center;
  background-color: #cceecf;
  border: solid 1px #ca7f1c;
}

#panel {
  padding: 50px;
  display: none;
}
</style>
</head>
<body>
 
<div id="flip">Click to show or hide the image</div>
<div id="panel"> <img src="https://www.kasandbox.org/programming-images/animals/butterfly_monarch.png"></div>
  </body>
</html>
